[project]
name = "genai-labs-analytics-pipeline"
version = "0.1.0"
description = "Production-grade LLM-driven analytics pipeline over a single-table SQL dataset."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Bhavya Bhushan" }]
dependencies = [
    "openrouter>=0.9.0",
    "pandas>=2.0",
    "python-dotenv>=1.0",
    "sqlglot>=26.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "opentelemetry-api>=1.30",
    "opentelemetry-sdk>=1.30",
    "opentelemetry-exporter-otlp-proto-http>=1.30",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["src"]

# ────────────────────────────────────────────────────────────────────────────
# Ruff — linting + formatting (replaces black, isort, flake8, pylint)
# ────────────────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 100
target-version = "py313"
src = ["src", "tests", "scripts"]
extend-exclude = [
    "tests/test_public.py",  # frozen per README — do not modify
    "src/types.py",          # frozen contract
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # bugbear (likely bugs)
    "SIM",  # simplify
    "RUF",  # ruff-specific
    "C4",   # comprehensions
    "PTH",  # use pathlib
    "RET",  # returns
    "ARG",  # unused arguments
    "TCH",  # type-checking imports
]
ignore = [
    "E501",  # line length — ruff format handles this
    "B008",  # fastapi-style function-call-in-default-arg (we don't do this, but keeps signatures readable)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ARG", "N802"]  # test method naming + unused args in fixtures

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ────────────────────────────────────────────────────────────────────────────
# Mypy — static type checking
# ────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
no_implicit_optional = true
check_untyped_defs = true
show_error_codes = true
pretty = true

[[tool.mypy.overrides]]
module = ["openrouter.*", "pandas.*", "sqlglot.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

# Baseline CSV loader: provided by the assessment, not part of our submission
# surface. Keep it runnable but don't gate CI on its type annotations.
[[tool.mypy.overrides]]
module = "scripts.gaming_csv_to_db"
ignore_errors = true

# ────────────────────────────────────────────────────────────────────────────
# Pyright — IDE/LSP type checker (VS Code default)
# Points at .venv so the editor resolves installed packages.
# ────────────────────────────────────────────────────────────────────────────
[tool.pyright]
venvPath = "."
venv = ".venv"
pythonVersion = "3.13"
include = ["src", "tests", "scripts"]
exclude = ["**/node_modules", "**/__pycache__", "**/.*", ".venv", "data"]

# ────────────────────────────────────────────────────────────────────────────
# Coverage (optional future use)
# ────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "scripts/*"]
